<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>FIRS Government Dashboard</title>
<style>
:root{--bg:#08111f;--panel:#121c2f;--panel2:#182743;--line:#253554;--text:#edf2fb;--muted:#9fb0ca;--accent:#1f6feb}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}.layout{display:grid;grid-template-columns:250px 1fr;min-height:100vh}.sidebar{padding:24px;border-right:1px solid var(--line);background:#0d1627}.brand{font-size:28px;font-weight:800;letter-spacing:.08em;margin-bottom:24px}.brand span{color:var(--accent)}.nav{display:grid;gap:10px}.nav button,.nav a{padding:13px 14px;border-radius:12px;background:transparent;border:1px solid transparent;color:var(--muted);text-align:left;cursor:pointer;text-decoration:none}.nav button.active,.nav button:hover,.nav a:hover{background:var(--panel);border-color:var(--line);color:var(--text)}.main{padding:24px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px}.stat{font-size:30px;font-weight:800}.content{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px;border-bottom:1px solid var(--line);text-align:left}.alert{padding:12px 14px;border-radius:12px;margin-bottom:12px;display:none;background:rgba(220,53,69,.12);border:1px solid rgba(220,53,69,.35)}@media(max-width:1000px){.grid,.content{grid-template-columns:1fr}}@media(max-width:760px){.layout{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:1px solid var(--line)}}
</style></head><body><div class="layout"><aside class="sidebar"><div class="brand">F<span>I</span>RS</div><div class="nav"><button class="active">Compliance Overview</button><a href="index.html">Back to Landing</a><button id="logoutBtn">Logout</button></div></aside><main class="main"><div style="display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px"><div><h1 id="heading" style="margin:0 0 6px">Government dashboard</h1><div style="color:var(--muted)">License and compliance monitoring view with real backend summary data.</div></div><div style="padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:var(--panel);color:var(--muted)" id="statusPill">Authority</div></div><div id="alert" class="alert"></div><div class="grid"><div class="card"><div style="color:var(--muted)">Pending Licenses</div><div class="stat" id="pendingLicenses">0</div></div><div class="card"><div style="color:var(--muted)">Verified Dealers</div><div class="stat" id="verifiedDealers">0</div></div><div class="card"><div style="color:var(--muted)">Flagged Orders</div><div class="stat" id="flaggedOrders">0</div></div><div class="card"><div style="color:var(--muted)">Restricted Inventory</div><div class="stat" id="restrictedInventory">0</div></div></div><div class="content"><div class="card"><h3>Verification Queue</h3><table class="table"><thead><tr><th>Name</th><th>Role</th><th>Status</th></tr></thead><tbody id="queueBody"></tbody></table></div><div class="card"><h3>Restricted Firearms Overview</h3><table class="table"><thead><tr><th>Firearm</th><th>Type</th><th>Stock</th></tr></thead><tbody id="restrictedBody"></tbody></table></div></div></main></div>
<script>
const API='http://localhost:8080/api'; function money(v){return `$${Number(v||0).toFixed(2)}`}
function alertMsg(msg){const el=document.getElementById('alert');el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',2600)}
async function fetchJson(url,opts={}){const res=await fetch(url,{credentials:'include',...opts,headers:{'Content-Type':'application/json',...(opts.headers||{})}});const data=(res.headers.get('content-type')||'').includes('application/json')?await res.json():{}; if(!res.ok) throw new Error(data.message||'Request failed'); return data;}
async function ensureSession(){const data=await fetchJson(`${API}/auth/session`); if(!data.loggedIn){location.href='auth_page.html';return false;} if(data.user.role!=='GOVERNMENT'){const routes={ADMIN:'admin_dashboard.html',CUSTOMER:'customer_view.html',DEALER:'dealer_view.html'}; location.href=routes[data.user.role]||'auth_page.html'; return false;} heading.textContent=`Government dashboard · ${data.user.name}`; statusPill.textContent=`Status: ${data.user.status}`; return true;}
async function loadDash(){const data=await fetchJson(`${API}/dashboard/government`); pendingLicenses.textContent=data.summary.pendingLicenses; verifiedDealers.textContent=data.summary.verifiedDealers; flaggedOrders.textContent=data.summary.flaggedOrders; restrictedInventory.textContent=data.summary.restrictedInventory; queueBody.innerHTML=(data.verificationQueue||[]).map(u=>`<tr><td>${u.name}</td><td>${u.role}</td><td>${u.status}</td></tr>`).join('')||'<tr><td colspan="3">No pending verification requests.</td></tr>'; restrictedBody.innerHTML=(data.restrictedProducts||[]).map(p=>`<tr><td>${p.name}</td><td>${p.type}</td><td>${p.stock??0}</td></tr>`).join('')||'<tr><td colspan="3">No restricted firearms found.</td></tr>';}
logoutBtn.onclick=async()=>{await fetchJson(`${API}/auth/logout`,{method:'POST'});location.href='auth_page.html';};
(async()=>{try{if(await ensureSession()) await loadDash();}catch(err){alertMsg(err.message)}})();
</script></body></html>
